<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Portal do Usuário - Chamados</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="bg-gray-900 text-gray-100">
    <div id="mobile-overlay" class="mobile-overlay"></div>
    <div class="flex h-screen">
      <aside id="mobile-sidebar" class="mobile-sidebar w-64 bg-gray-800 flex flex-col flex-shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-gray-700">
          <span class="w-10 h-10 rounded-lg bg-blue-600 mr-3 flex items-center justify-center text-xl">🚁</span>
          <span class="font-semibold text-lg text-gray-200">Aero Chamados</span>
        </div>
        <nav class="flex-1 px-4 py-4 space-y-2 text-sm">
          <span class="block text-gray-400 text-xs uppercase mb-1">Usuário</span>
          <a href="/usuario.html" class="flex items-center px-3 py-2 rounded bg-gray-900 text-blue-400 font-medium">
            <span class="ml-1">Meus Chamados</span>
          </a>
        </nav>
      </aside>

      <main class="mobile-main flex-1 flex flex-col min-w-0">
        <header class="mobile-header h-14 flex items-center justify-between px-4 border-b border-gray-800 bg-gray-900/80 backdrop-filter backdrop-blur">
          <div class="flex items-center gap-3">
            <button id="btn-mobile-menu" class="p-2 rounded-lg hover:bg-gray-800 md:hidden" aria-label="Menu">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <div>
            <h1 class="text-lg font-semibold tracking-wide text-gray-200">Meus Chamados</h1>
            <p class="text-xs text-gray-500 hidden sm:block">Abra e acompanhe seus pedidos de suporte</p>
            </div>
          </div>
          <div class="flex items-center space-x-4 text-xs">
            <span id="user-name" class="text-gray-300 font-medium">Usuário Atual</span>
            <button
              id="btn-logout-user"
              class="px-3 py-1.5 rounded-full border border-gray-600 text-gray-200 hover:bg-gray-800"
            >
              Sair
            </button>
          </div>
        </header>

        <section class="mobile-content flex-1 overflow-y-auto p-4 md:p-6 space-y-4 md:space-y-6 text-sm">
          <div class="flex border-b border-gray-700 mb-4 text-xs">
            <button
              id="tab-abertos"
              class="flex-1 px-4 py-3 border-b-2 border-blue-500 text-blue-400 font-semibold min-h-[44px]"
            >
              Meus Chamados
            </button>
            <button
              id="tab-finalizados"
              class="flex-1 px-4 py-3 border-b-2 border-transparent text-gray-400 hover:text-gray-200 min-h-[44px]"
            >
              Finalizados
            </button>
          </div>

          <div class="flex justify-between items-center mb-2">
            <div>
              <p class="text-xs text-gray-400">
                <span id="user-total-label">Em aberto:</span>
                <span id="user-total" class="font-semibold text-gray-200">0</span>
              </p>
            </div>
            <button
              id="btn-new-ticket-user"
              class="px-4 py-3 rounded-full bg-blue-600 hover:bg-blue-500 text-sm font-semibold min-h-[44px]"
            >
              Novo Chamado
            </button>
          </div>

          <div class="bg-gray-800 rounded-xl p-4 shadow">
            <div class="overflow-x-auto">
              <table class="w-full text-left text-xs">
                <thead class="text-gray-400 text-[11px] uppercase border-b border-gray-700">
                  <tr>
                    <th class="py-2 pr-3">ID</th>
                    <th class="py-2 pr-3">Título</th>
                    <th class="py-2 pr-3">Prioridade</th>
                    <th class="py-2 pr-3">Status</th>
                    <th class="py-2 pr-3">Técnico</th>
                    <th class="py-2 pr-3">Atualização</th>
                    <th class="py-2 pr-3">Ações</th>
                  </tr>
                </thead>
                <tbody id="user-tickets-body" class="text-[11px]">
                  <!-- preenchido via JS -->
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Modal Chat -->
    <div
      id="modal-chat-user"
      class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden p-2 md:p-4"
    >
      <div class="bg-gray-800 rounded-xl w-full max-w-md shadow-xl border border-gray-700 flex flex-col max-h-[90vh] md:max-h-[80vh]">
        <div class="flex justify-between items-center px-4 py-3 border-b border-gray-700">
          <h2 class="text-sm font-semibold text-gray-200">Chat - Chamado <span id="chat-user-ticket-id"></span></h2>
          <button id="modal-chat-user-close" class="text-gray-400 hover:text-gray-200 text-lg leading-none">&times;</button>
        </div>
        <div id="chat-user-messages" class="flex-1 overflow-y-auto p-4 space-y-2 min-h-[200px] max-h-[300px]"></div>
        <form id="form-chat-user" class="p-4 border-t border-gray-700">
          <div class="flex gap-2">
            <input
              id="chat-user-input"
              type="text"
              placeholder="Digite sua mensagem..."
              class="flex-1 px-3 py-2 rounded bg-gray-900 border border-gray-700 text-sm focus:outline-none focus:border-blue-500"
            />
            <button type="submit" class="px-4 py-2 rounded bg-blue-600 hover:bg-blue-500 text-sm font-medium">
              Enviar
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Modal Chamado Usuário -->
    <div
      id="modal-user-ticket"
      class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden p-4 overflow-y-auto"
    >
      <div class="bg-gray-800 rounded-xl p-4 md:p-6 w-full max-w-md shadow-xl border border-gray-700 my-4">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-sm font-semibold text-gray-200">Novo Chamado</h2>
          <button id="modal-user-close" class="text-gray-400 hover:text-gray-200 text-lg leading-none">&times;</button>
        </div>
        <form id="form-user-ticket" class="space-y-3 text-xs">
          <div>
            <label class="block mb-1 text-gray-300" for="user-ticket-title">Título</label>
            <input
              id="user-ticket-title"
              type="text"
              required
              class="w-full px-3 py-2 rounded bg-gray-900 border border-gray-700 text-xs focus:outline-none focus:border-blue-500"
            />
          </div>
          <div>
            <label class="block mb-1 text-gray-300" for="user-ticket-description">Descrição</label>
            <textarea
              id="user-ticket-description"
              rows="3"
              class="w-full px-3 py-2 rounded bg-gray-900 border border-gray-700 text-xs focus:outline-none focus:border-blue-500 resize-none"
            ></textarea>
          </div>
          <div>
            <label class="block mb-1 text-gray-300" for="user-ticket-priority">Prioridade</label>
            <select
              id="user-ticket-priority"
              class="w-full px-3 py-2 rounded bg-gray-900 border border-gray-700 text-xs focus:outline-none focus:border-blue-500"
            >
              <option value="baixa">Baixa</option>
              <option value="media">Média</option>
              <option value="alta">Alta</option>
            </select>
          </div>
          <div class="flex justify-end space-x-2 pt-2">
            <button
              type="button"
              id="btn-user-cancel"
              class="px-3 py-1.5 rounded-full border border-gray-600 text-gray-300 hover:bg-gray-700"
            >
              Cancelar
            </button>
            <button
              type="submit"
              class="px-3 py-1.5 rounded-full bg-blue-600 hover:bg-blue-500 text-white font-semibold"
            >
              Enviar Chamado
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="/auth.js"></script>
    <script src="/mobile.js"></script>
    <script src="/usuario.js"></script>
  </body>
</html>
