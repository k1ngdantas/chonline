<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Admin - Usuários Cadastrados</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="bg-gray-900 text-gray-100">
    <div id="mobile-overlay" class="mobile-overlay"></div>
    <div class="flex h-screen">
      <aside id="mobile-sidebar" class="mobile-sidebar w-64 bg-gray-800 flex flex-col flex-shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-gray-700">
          <span class="w-10 h-10 rounded-lg bg-blue-600 mr-3 flex items-center justify-center text-xl">🚁</span>
          <span class="font-semibold text-lg text-gray-200">Aero Chamados</span>
        </div>
        <nav class="flex-1 px-4 py-4 space-y-2 text-sm">
          <span class="block text-gray-400 text-xs uppercase mb-1">Administrador</span>
          <a href="/index.html" class="flex items-center px-3 py-2 rounded hover:bg-gray-700">
            <span class="ml-1">Dashboard Geral</span>
          </a>
          <a href="/admin-tecnicos.html" class="flex items-center px-3 py-2 rounded hover:bg-gray-700">
            <span class="ml-1">Cadastro de Técnicos</span>
          </a>
          <a href="/admin-resolvidos.html" class="flex items-center px-3 py-2 rounded hover:bg-gray-700">
            <span class="ml-1">Chamados Resolvidos</span>
          </a>
          <a
            href="/admin-usuarios.html"
            class="flex items-center px-3 py-2 rounded bg-gray-900 text-blue-400 font-medium"
          >
            <span class="ml-1">Usuários Cadastrados</span>
          </a>
        </nav>
      </aside>

      <main class="mobile-main flex-1 flex flex-col min-w-0">
        <header class="mobile-header h-14 flex items-center justify-between px-4 border-b border-gray-800 bg-gray-900/80 backdrop-filter backdrop-blur">
          <div class="flex items-center gap-3">
            <button id="btn-mobile-menu" class="p-2 rounded-lg hover:bg-gray-800 md:hidden" aria-label="Menu">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <div>
            <h1 class="text-lg font-semibold tracking-wide text-gray-200">Usuários Cadastrados</h1>
            <p class="text-xs text-gray-500 hidden sm:block">Usuários normais que podem abrir chamados</p>
            </div>
          </div>
          <button
            id="btn-logout-admin"
            class="px-3 py-1.5 rounded-full border border-gray-600 text-gray-200 hover:bg-gray-800 text-xs"
          >
            Sair
          </button>
        </header>

        <section class="mobile-content flex-1 overflow-y-auto p-4 md:p-6 space-y-4 text-sm">
          <div class="bg-gray-800 rounded-xl p-4 shadow">
            <div class="flex items-center justify-between mb-3">
              <span class="text-gray-200 font-semibold text-sm">Lista de Usuários</span>
              <span id="users-count" class="text-xs text-gray-400">0 usuários</span>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-left text-xs">
                <thead class="text-gray-400 text-[11px] uppercase border-b border-gray-700">
                  <tr>
                    <th class="py-2 pr-3">ID</th>
                    <th class="py-2 pr-3">Nome</th>
                    <th class="py-2 pr-3">Usuário</th>
                    <th class="py-2 pr-3">Seção</th>
                  </tr>
                </thead>
                <tbody id="users-body" class="text-[11px]">
                  <!-- preenchido via JS -->
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/auth.js"></script>
    <script src="/mobile.js"></script>
    <script src="/admin-usuarios.js"></script>
  </body>
</html>
